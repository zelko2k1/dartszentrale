# CI — runs on every push and pull request: lint, tests, production build.
# Keeps the green checkmark honest: if this fails, the app would not build or
# a scoring rule is broken.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests (game logic)
        run: npm test

      - name: Build
        run: npm run build
