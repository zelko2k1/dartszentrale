name: 💡 Idee oder Wunsch
description: Eine neue Funktion oder Verbesserung vorschlagen
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für die Idee! Je konkreter der Vereinsalltag dahinter, desto besser lässt
        sich einschätzen, ob und wie es umsetzbar ist.
  - type: textarea
    id: problem
    attributes:
      label: Welches Problem löst das?
      description: Was fehlt dir heute, oder was ist umständlich?
    validations:
      required: true
  - type: textarea
    id: idee
    attributes:
      label: Wie könnte die Lösung aussehen?
      description: Beschreibe deine Idee — grob genügt.
    validations:
      required: true
  - type: dropdown
    id: modus
    attributes:
      label: Betrifft welchen Betriebsmodus?
      options:
        - Alle
        - Lokal (ein Board)
        - Verein im LAN
        - Cloud
        - Weiß ich nicht
    validations:
      required: false
  - type: textarea
    id: kontext
    attributes:
      label: Weiterer Kontext (optional)
      description: Alternativen, die du schon probiert hast, Beispiele, Skizzen …
    validations:
      required: false
