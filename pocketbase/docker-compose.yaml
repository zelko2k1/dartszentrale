# PocketBase für den Vereinsmodus — Deployment via Coolify (Docker Compose).
# Coolify übernimmt Reverse-Proxy + HTTPS; die Domain (db.<deine-domain>) wird in der Coolify-UI gesetzt.
# WICHTIG: Das Volume pb_data ist persistent → enthält SQLite-DB + Uploads + Backups.
#          Ohne dieses Volume wären die Daten nach einem Redeploy weg.
services:
  pocketbase:
    # Eigenes Image (Basis: muchobien/pocketbase) mit fest eingebackenem Schema +
    # Hooks — siehe Dockerfile. Robuster als Bind-Mounts, die in Coolify je nach
    # Arbeitsverzeichnis leer bleiben.
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Command explizit pinnen → Hooks-/Migrations-Verzeichnis auf die ins Image
    # gebackenen Pfade (NICHT /pb_migrations|/pb_hooks, das sind evtl. Volumes).
    command:
      - serve
      - --http=0.0.0.0:8090
      - --dir=/pb_data
      - --hooksDir=/pb/hooks
      - --migrationsDir=/pb/migrations
    # Zielport für Coolifys Proxy (in der UI db.<domain> → Port 8090 verdrahten).
    # ⚠ SICHERHEIT (Internet-Betrieb): "8090:8090" veröffentlicht PocketBase als
    # KLARTEXT-HTTP auf dem Host (0.0.0.0:8090) – am TLS-Proxy vorbei. Solange die
    # App PB direkt über die LAN-IP erreicht (VITE_PB_URL=http://<lan-ip>:8090), wird
    # dieses Mapping gebraucht. Sobald PB AUSSCHLIESSLICH hinter dem HTTPS-Proxy läuft:
    # dieses Mapping ENTFERNEN (Coolify routet intern) ODER auf "127.0.0.1:8090:8090"
    # binden und Port 8090 in der Host-Firewall vom Internet sperren. Siehe
    # docs/security-audit.md (Befund #3).
    ports:
      - "8090:8090"
    volumes:
      # Persistente Laufzeitdaten (SQLite + Uploads + Backups) – named volume.
      # Migrations/Hooks liegen im Image (Dockerfile), brauchen daher KEIN Volume.
      - pb_data:/pb_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pb_data:
