services:
  dartzentrale:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Wert kommt aus app/.env (NICHT versioniert) oder aus der Arcane-Stack-Umgebung.
        # Build-Zeit, nicht Laufzeit! Fehlt er, bricht der Build bewusst ab (siehe app/.env.example).
        # Quoting Pflicht: sonst deutet YAML den ':' im ${...} als Map.
        - "VITE_PB_URL=${VITE_PB_URL:?VITE_PB_URL fehlt - in Arcane-Stack-Env oder app/.env setzen}"
    ports:
      - "8081:80"
    restart: unless-stopped
