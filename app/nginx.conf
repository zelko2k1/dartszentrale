server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # nginx-Version nicht im Server-Header / Fehlerseiten preisgeben.
    server_tokens off;

    # Sicherheits-Header (greifen für alle Antworten).
    # Clickjacking-Schutz: die App wird nirgends eingebettet → DENY.
    add_header X-Frame-Options "DENY" always;
    # MIME-Sniffing unterbinden.
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer sparsam senden.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Browser-Features per Default abschalten (App nutzt keine).
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS übernimmt i. d. R. der TLS-Proxy (Coolify/Cloudflare). Falls hier gewünscht
    # und die App AUSSCHLIESSLICH über HTTPS läuft, einkommentieren:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Content-Security-Policy — DEPLOYMENT-SPEZIFISCH, daher als Vorlage auskommentiert.
    # WICHTIG vor dem Aktivieren testen: 'connect-src' MUSS die PocketBase-URL enthalten
    # (sonst schlägt jeder API-Aufruf fehl). React setzt Inline-Styles via DOM-Property,
    # daher reicht 'style-src 'self''; Schriften sind ins Bundle gebacken.
    # add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://db.DEINE-DOMAIN.de; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # SPA: alle nicht gefundenen Pfade auf index.html zurückfallen lassen,
    # damit clientseitiges Routing + Reload auf Unterseiten funktionieren.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
